name = "el-clasico-otp"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV namespace that stores OTPs (with TTL). Replace the id after you run:
#   wrangler kv namespace create OTP_KV
[[kv_namespaces]]
binding = "OTP_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Non-secret config. Secrets (WA_TOKEN) are set with `wrangler secret put`.
[vars]
WA_PHONE_ID = "REPLACE_WITH_PHONE_NUMBER_ID"
WA_TEMPLATE = "REPLACE_WITH_OTP_TEMPLATE_NAME"
WA_LANG = "en_US"
WA_TEMPLATE_BUTTON = "true"
ALLOW_ORIGIN = "https://deepanmahalingam.github.io"
